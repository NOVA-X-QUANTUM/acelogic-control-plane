#namespaceSelector added

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: acelogic-evaluator
webhooks:
- name: evaluator.acelogic.ai
  admissionReviewVersions: ["v1"]
  sideEffects: None
  timeoutSeconds: 5
  failurePolicy: Fail
  namespaceSelector:
    matchLabels:
      acelogic.ai/enabled: "true"
  clientConfig:
    service:
      name: acelogic-evaluator
      namespace: acelogic-system
      path: "/validate"
    caBundle: <BASE64_ENCODED_CA_CERT>
  rules:
  - operations: ["CREATE","UPDATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]

        
