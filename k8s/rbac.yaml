apiVersion: v1
kind: Namespace
metadata:
  name: acelogic-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: acelogic-evaluator
  namespace: acelogic-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: acelogic-evaluator
rules:
  - apiGroups: ["acelogic.ai"]
    resources: ["agentidentitypolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: acelogic-evaluator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: acelogic-evaluator
subjects:
  - kind: ServiceAccount
    name: acelogic-evaluator
    namespace: acelogic-system


