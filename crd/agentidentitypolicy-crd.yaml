# enhanced security and functionality 


apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentidentitypolicies.acelogic.ai
  annotations:
    api-approved.kubernetes.io: "unapproved"  
spec:
  group: acelogic.ai
  names:
    kind: AgentIdentityPolicy
    plural: agentidentitypolicies
    singular: agentidentitypolicy
    shortNames:
      - aip
    categories:
      - acelogic
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required:
                - agentId
                - licenseTier
                - grammarLicense
                - symbolicNamespace
                - k8sNamespace
                - mission
                - fingerprintAlgorithm
                - fingerprintVersion
                - fingerprint
                - purposeHashAlgorithm
                - purposeHash
                - state
                - lease
                - lastUpdated
              properties:
                agentId:
                  type: string
                agentClass:
                  type: string
                licenseTier:
                  type: string
                  enum: ["TIER_0", "TIER_1", "TIER_2", "TIER_3", "TIER_4", "TIER_5"]
                grammarLicense:
                  type: object
                  required: ["enabled", "level"]
                  properties:
                    enabled:
                      type: boolean
                    level:
                      type: string
                      enum: ["NONE", "RESTRICTED", "FULL"]
                    allowedPrefixes:
                      type: array
                      items:
                        type: string
                symbolicNamespace:
                  type: string
                k8sNamespace:
                  type: string
                  pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
                mission:
                  type: string
                owner:
                  type: string
                fingerprintAlgorithm:
                  type: string
                  enum: ["SHA-256"]
                fingerprintVersion:
                  type: string
                  enum: ["v1"]
                fingerprint:
                  type: string
                  pattern: "^[a-f0-9]{64}$"
                purposeHashAlgorithm:
                  type: string
                  enum: ["SHA3-256"]
                purposeHash:
                  type: string
                  pattern: "^[a-f0-9]{64}$"
                covenantHash:
                  type: string
                  nullable: true
                  pattern: "^[a-f0-9]{64}$"
                state:
                  type: string
                  enum: ["ACTIVE", "SAFE_MODE", "REVOKED"]
                safeModeReason:
                  type: string
                  nullable: true
                lease:
                  type: object
                  required: ["epoch", "expiresAt"]
                  properties:
                    epoch:
                      type: integer
                      minimum: 0
                    expiresAt:
                      type: string
                      format: date-time
                source:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                lastUpdated:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Agent
          type: string
          jsonPath: .spec.agentId
        - name: Tier
          type: string
          jsonPath: .spec.licenseTier
        - name: Grammar
          type: string
          jsonPath: .spec.grammarLicense.level
        - name: State
          type: string
          jsonPath: .spec.state
        - name: Epoch
          type: integer
          jsonPath: .spec.lease.epoch


# ############################################################
