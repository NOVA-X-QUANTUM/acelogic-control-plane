############################################################
# ACELOGIC PLATFORM v4
############################################################
# Module        : CONSTRAINTTEMPLATE-ACELOGIC-LOCAL-POLICY
# Environment   : Development
# Version       : 4.2.0
# Updated       : 2026-05-15
#
# Purpose:
# Cluster-local ACELOGIC™ policy binding enforcement for
# deterministic identity, symbolic namespace, continuity state,
# namespace projection, and license-tier governance.
#
# Gatekeeper Note:
# Requires AgentIdentityPolicy resources synced into
# data.inventory.
#
# This Gatekeeper policy provides metadata-level governance.
# Full cryptographic hash recomputation, duplicate-runtime
# arbitration, continuity reconciliation, lease evaluation,
# and enterprise conflict resolution are enforced by the
# ACELOGIC™ local-policy-evaluator webhook.
############################################################

apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate

metadata:
  name: acelogicpolicybinding

spec:
  crd:
    spec:
      names:
        kind: ACELOGICPolicyBinding

      validation:
        openAPIV3Schema:
          type: object

          properties:
            policyNamespace:
              type: string
              minLength: 1

  targets:
    - target: admission.k8s.gatekeeper.sh

      rego: |
        package acelogic.policybinding

        ####################################################
        # Protected Admission Operations
        ####################################################

        protected_operation {
          input.review.operation == "CREATE"
        }

        protected_operation {
          input.review.operation == "UPDATE"
        }

        ####################################################
        # Safe Metadata Extraction
        ####################################################

        labels := object.get(input.review.object.metadata, "labels", {})

        annotations := object.get(input.review.object.metadata, "annotations", {})

        agent_id := object.get(labels, "acelogic.ai/agent-id", "")

        symbolic_namespace := object.get(annotations, "acelogic.ai/symbolic-namespace", "")

        ####################################################
        # Inventory Availability
        ####################################################

        inventory_available {
          data.inventory.namespace[input.parameters.policyNamespace]
        }

        ####################################################
        # AgentIdentityPolicy Lookup
        ####################################################

        matching_policies[policy] {
          some name

          policy := data.inventory.namespace[input.parameters.policyNamespace]["acelogic.ai/v1"]["AgentIdentityPolicy"][name]

          policy.spec.agentId == agent_id
        }

        exactly_one_policy {
          count(matching_policies) == 1
        }

        selected_policy = policy {
          exactly_one_policy
          policy := matching_policies[_]
        }

        ####################################################
        # Fail-Closed Inventory Protection
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          not inventory_available

          msg := sprintf("ACELOGIC DENY: policy inventory unavailable namespace=%v", [input.parameters.policyNamespace])
        }

        ####################################################
        # Missing Agent Identity
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          agent_id == ""

          msg := "ACELOGIC DENY: missing deterministic agent identity label"
        }

        ####################################################
        # Missing Symbolic Namespace
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          symbolic_namespace == ""

          msg := "ACELOGIC DENY: missing symbolic namespace annotation"
        }

        ####################################################
        # Ambiguous / Missing Policy Binding
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation
          inventory_available
          agent_id != ""

          count(matching_policies) == 0

          msg := sprintf("ACELOGIC DENY: no AgentIdentityPolicy bound to agentId=%v", [agent_id])
        }

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation
          inventory_available
          agent_id != ""

          count(matching_policies) > 1

          msg := sprintf("ACELOGIC DENY: multiple AgentIdentityPolicy objects bound to agentId=%v", [agent_id])
        }

        ####################################################
        # Identity State Enforcement
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation
          inventory_available
          agent_id != ""
          exactly_one_policy

          policy := selected_policy

          policy.spec.state != "ACTIVE"

          msg := sprintf("ACELOGIC DENY: identity is not ACTIVE state=%v", [policy.spec.state])
        }

        ####################################################
        # Symbolic Namespace Binding
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation
          inventory_available
          agent_id != ""
          symbolic_namespace != ""
          exactly_one_policy

          policy := selected_policy

          symbolic_namespace != policy.spec.symbolicNamespace

          msg := "ACELOGIC DENY: symbolic namespace mismatch"
        }

        ####################################################
        # Kubernetes Namespace Projection
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation
          inventory_available
          agent_id != ""
          exactly_one_policy

          policy := selected_policy

          input.review.object.metadata.namespace != policy.spec.k8sNamespace

          msg := "ACELOGIC DENY: projected Kubernetes namespace mismatch"
        }

        ####################################################
        # Covenant Hash Tier Restriction
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation
          inventory_available
          agent_id != ""
          exactly_one_policy

          policy := selected_policy

          policy.spec.licenseTier != "TIER_5"
          object.get(policy.spec, "covenantHash", "") != ""

          msg := "ACELOGIC DENY: covenantHash is only allowed for Tier 5"
        }

        ####################################################
        # Tier 5 Covenant Hash Requirement
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation
          inventory_available
          agent_id != ""
          exactly_one_policy

          policy := selected_policy

          policy.spec.licenseTier == "TIER_5"
          object.get(policy.spec, "covenantHash", "") == ""

          msg := "ACELOGIC DENY: Tier 5 requires covenantHash"
        }

        ####################################################
        # Immutable Agent Identity Protection
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          input.review.operation == "UPDATE"

          old_labels := object.get(input.review.oldObject.metadata, "labels", {})
          new_labels := object.get(input.review.object.metadata, "labels", {})

          old_id := object.get(old_labels, "acelogic.ai/agent-id", "")
          new_id := object.get(new_labels, "acelogic.ai/agent-id", "")

          old_id != new_id

          msg := "ACELOGIC DENY: agent identity mutation detected"
        }

        ####################################################
        # Immutable Symbolic Namespace Protection
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          input.review.operation == "UPDATE"

          old_annotations := object.get(input.review.oldObject.metadata, "annotations", {})
          new_annotations := object.get(input.review.object.metadata, "annotations", {})

          old_symbolic := object.get(old_annotations, "acelogic.ai/symbolic-namespace", "")
          new_symbolic := object.get(new_annotations, "acelogic.ai/symbolic-namespace", "")

          old_symbolic != new_symbolic

          msg := "ACELOGIC DENY: symbolic namespace mutation detected"
        }

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: ACELOGICPolicyBinding

metadata:
  name: acelogic-policy-binding

spec:
  enforcementAction: deny

  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]

    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - acelogic-system

  parameters:
    policyNamespace: acelogic-system

