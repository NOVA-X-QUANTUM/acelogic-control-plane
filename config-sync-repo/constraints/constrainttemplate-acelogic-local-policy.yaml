############################################################
# ACELOGIC PLATFORM v4
############################################################
# Module        : CONSTRAINTTEMPLATE-ACELOGIC-LOCAL-POLICY
# Environment   : Development
# Version       : 4.1.0
# Updated       : 2026-05-15
#
# Purpose:
# Cluster-local ACELOGIC policy binding enforcement for
# deterministic identity, symbolic namespace, continuity state,
# namespace projection, and license-tier governance.
#
# Gatekeeper Note:
# Requires AgentIdentityPolicy resources synced into
# data.inventory.
#
# For full cryptographic hash recomputation, continuity
# reconciliation, duplicate-runtime arbitration, and enterprise
# conflict resolution, use the custom ACELOGIC local-policy-evaluator
# webhook.
############################################################

apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate

metadata:
  name: acelogicpolicybinding

spec:
  crd:
    spec:
      names:
        kind: ACELOGICPolicyBinding

      validation:
        openAPIV3Schema:
          type: object
          properties:
            policyNamespace:
              type: string

  targets:
    - target: admission.k8s.gatekeeper.sh

      rego: |
        package acelogic.policybinding

        ####################################################
        # Protected Admission Operations
        ####################################################

        protected_operation {
          input.review.operation == "CREATE"
        }

        protected_operation {
          input.review.operation == "UPDATE"
        }

        ####################################################
        # Agent Identity Extraction
        ####################################################

        agent_id := input.review.object.metadata.labels["acelogic.ai/agent-id"]

        symbolic_namespace := input.review.object.metadata.annotations["acelogic.ai/symbolic-namespace"]

        ####################################################
        # AgentIdentityPolicy Lookup
        ####################################################

        get_policy(agent_id, policy_ns) = policy {
          some name

          policy := data.inventory.namespace[policy_ns]["acelogic.ai/v1"]["AgentIdentityPolicy"][name]

          policy.spec.agentId == agent_id
        }

        ####################################################
        # Missing Agent Identity
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          not input.review.object.metadata.labels["acelogic.ai/agent-id"]

          msg := "ACELOGIC DENY: missing deterministic agent identity label"
        }

        ####################################################
        # Missing Symbolic Namespace
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          not input.review.object.metadata.annotations["acelogic.ai/symbolic-namespace"]

          msg := "ACELOGIC DENY: missing symbolic namespace annotation"
        }

        ####################################################
        # Missing AgentIdentityPolicy Binding
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          agent_id != ""

          not get_policy(agent_id, input.parameters.policyNamespace)

          msg := sprintf("ACELOGIC DENY: no active continuity policy bound to agent identity agentId=%v", [agent_id])
        }

        ####################################################
        # Identity State Enforcement
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          agent_id != ""

          policy := get_policy(agent_id, input.parameters.policyNamespace)

          policy.spec.state != "ACTIVE"

          msg := sprintf("ACELOGIC DENY: identity is not ACTIVE state=%v", [policy.spec.state])
        }

        ####################################################
        # Symbolic Namespace Binding
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          agent_id != ""
          symbolic_namespace != ""

          policy := get_policy(agent_id, input.parameters.policyNamespace)

          symbolic_namespace != policy.spec.symbolicNamespace

          msg := "ACELOGIC DENY: symbolic namespace mismatch"
        }

        ####################################################
        # Kubernetes Namespace Projection
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          agent_id != ""

          policy := get_policy(agent_id, input.parameters.policyNamespace)

          input.review.object.metadata.namespace != policy.spec.k8sNamespace

          msg := "ACELOGIC DENY: projected Kubernetes namespace mismatch"
        }

        ####################################################
        # Continuity / Governance Hash Tier Restriction
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          agent_id != ""

          policy := get_policy(agent_id, input.parameters.policyNamespace)

          policy.spec.licenseTier != "TIER_5"
          policy.spec.continuityHash

          msg := "ACELOGIC DENY: continuityHash is only allowed for Tier 5"
        }

        ####################################################
        # Tier 5 Continuity Hash Requirement
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          protected_operation

          agent_id != ""

          policy := get_policy(agent_id, input.parameters.policyNamespace)

          policy.spec.licenseTier == "TIER_5"
          not policy.spec.continuityHash

          msg := "ACELOGIC DENY: Tier 5 requires continuityHash"
        }

        ####################################################
        # Immutable Agent Identity Protection
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          input.review.operation == "UPDATE"

          old_id := input.review.oldObject.metadata.labels["acelogic.ai/agent-id"]
          new_id := input.review.object.metadata.labels["acelogic.ai/agent-id"]

          old_id != new_id

          msg := "ACELOGIC DENY: agent identity mutation detected"
        }

        ####################################################
        # Immutable Symbolic Namespace Protection
        ####################################################

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          input.review.operation == "UPDATE"

          old_symbolic := input.review.oldObject.metadata.annotations["acelogic.ai/symbolic-namespace"]
          new_symbolic := input.review.object.metadata.annotations["acelogic.ai/symbolic-namespace"]

          old_symbolic != new_symbolic

          msg := "ACELOGIC DENY: symbolic namespace mutation detected"
        }

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: ACELOGICPolicyBinding

metadata:
  name: acelogic-policy-binding

spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]

  parameters:
    policyNamespace: acelogic-system

